<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QWX</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1117;
        color: #f3f5f7;
      }
      main {
        width: min(720px, calc(100vw - 32px));
        padding: 32px 28px;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        background: rgba(255,255,255,0.03);
        backdrop-filter: blur(12px);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }
      p {
        margin: 0 0 18px;
        line-height: 1.65;
        color: rgba(243,245,247,0.82);
      }
      a {
        color: #9cc7ff;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .link-list {
        display: grid;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>QWX</h1>
      <p>这个仓库现在作为一个可扩展的作品容器使用。当前可跳转的页面：</p>
      <div class="link-list">
        <a href="./background">Background Cosmics</a>
        <a href="./logo">Logo Animation</a>
      </div>
    </main>
  </body>
</html>
